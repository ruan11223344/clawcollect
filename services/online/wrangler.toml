name = "clawcollect-online"
main = "src/index.ts"
compatibility_date = "2025-03-10"
workers_dev = false
preview_urls = false

[vars]
# Production defaults. `npm run dev` overrides ENVIRONMENT locally.
ENVIRONMENT = "production"
HOSTED_SIGNUP_ENABLED = "true"
# ALLOWED_ORIGINS = "https://app.dorapush.com"

# Paddle product_id → plan mapping (required for webhook processing)
# Get these from your Paddle dashboard after creating products.
# PADDLE_PRODUCT_PRO = "pro_xxxxxxxxxxxx"
# PADDLE_PRODUCT_TEAM = "pro_yyyyyyyyyyyy"

# Paddle webhook signing secret (required in production)
# PADDLE_WEBHOOK_SECRET = ""

# Internal provisioning secret should be stored with:
#   npx wrangler secret put INTERNAL_PROVISIONING_SECRET
# Optional signup gate secret:
#   npx wrangler secret put HOSTED_SIGNUP_CODE

[[d1_databases]]
binding = "DB"
database_name = "clawcollect-db"
database_id = "cc1a45d0-ed4b-4356-8b95-d8e3c3090c96"
migrations_dir = "migrations"

[[routes]]
pattern = "collect.dorapush.com"
custom_domain = true

# TODO: Uncomment when file upload is implemented
# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "clawcollect-files"
